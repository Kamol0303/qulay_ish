# ====================================
# NGINX CONFIGURATION FOR QULAY ISH
# ====================================
# File: /etc/nginx/sites-available/qulay-ish
# 
# Setup steps:
# 1. Copy this file to /etc/nginx/sites-available/qulay-ish
# 2. Replace YOUR_DOMAIN.COM with your actual domain
# 3. Run: sudo ln -s /etc/nginx/sites-available/qulay-ish /etc/nginx/sites-enabled/
# 4. Run: sudo nginx -t
# 5. Run: sudo systemctl restart nginx

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN.COM www.YOUR_DOMAIN.COM;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN.COM www.YOUR_DOMAIN.COM;
    
    # SSL Certificate (update paths to your certificate files)
    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.COM/privkey.pem;
    
    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Set root directory
    root /var/www/qulay-ish/dist;
    index index.html;
    
    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;
    gzip_min_length 1024;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # SPA routing - send all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Cache assets (static files with hash in filename)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }
    
    location ~ /\.env {
        deny all;
    }
    
    # Logging
    access_log /var/log/nginx/qulay-ish-access.log;
    error_log /var/log/nginx/qulay-ish-error.log;
}
