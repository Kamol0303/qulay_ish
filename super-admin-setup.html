<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Setup - Qulay Ish</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 24px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { font-size: 32px; font-weight: 900; color: #1a202c; margin-bottom: 12px; }
        p { color: #718096; margin-bottom: 32px; line-height: 1.6; }
        .btn-group { display: grid; gap: 16px; margin-bottom: 24px; }
        button { padding: 18px; background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); color: white; border: none; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(220, 38, 38, 0.4); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-find { background: linear-gradient(135deg, #3182ce 0%, #2563eb 100%); }
        .btn-find:hover { box-shadow: 0 12px 24px rgba(49, 130, 206, 0.4); }
        #log { margin-top: 32px; padding: 24px; background: #f7fafc; border-radius: 16px; max-height: 400px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px; }
        .log-item { padding: 8px 0; border-bottom: 1px solid #e2e8f0; }
        .log-item:last-child { border-bottom: none; }
        .success { color: #38a169; font-weight: 600; }
        .error { color: #e53e3e; font-weight: 600; }
        .info { color: #3182ce; }
        .warning { color: #d69e2e; font-weight: 600; }
        .credentials { background: #edf2f7; padding: 20px; border-radius: 12px; margin-top: 16px; border: 2px solid #cbd5e0; }
        .credentials h3 { color: #2d3748; font-size: 18px; margin-bottom: 12px; }
        .cred-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #cbd5e0; }
        .cred-item:last-child { border-bottom: none; }
        .cred-label { font-weight: 600; color: #4a5568; }
        .cred-value { color: #1a202c; font-family: 'Courier New', monospace; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ Super Admin Setup</h1>
        <p>Bu sahifa super admin hisobini topadi yoki yangi super admin yaratadi.</p>
        
        <div class="btn-group">
            <button class="btn-find" onclick="findSuperAdmin()">🔍 Super Adminni topish</button>
            <button onclick="createSuperAdmin()">➕ Yangi Super Admin yaratish</button>
        </div>
        
        <div id="log"></div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, collection, getDocs, setDoc, doc, query, where } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCg0p8UOPAoe6WmhCRCbEBntCcL026w25o",
            authDomain: "gen-lang-client-0528497200.firebaseapp.com",
            projectId: "gen-lang-client-0528497200",
            storageBucket: "gen-lang-client-0528497200.firebasestorage.app",
            messagingSenderId: "519605089294",
            appId: "1:519605089294:web:ee4f72e5d340748e8cb85f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const item = document.createElement('div');
            item.className = `log-item ${type}`;
            item.textContent = message;
            logDiv.appendChild(item);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function showCredentials(email, password) {
            const logDiv = document.getElementById('log');
            const credDiv = document.createElement('div');
            credDiv.className = 'credentials';
            credDiv.innerHTML = `
                <h3>🔑 Super Admin Login Ma'lumotlari:</h3>
                <div class="cred-item">
                    <span class="cred-label">Email:</span>
                    <span class="cred-value">${email}</span>
                </div>
                <div class="cred-item">
                    <span class="cred-label">Password:</span>
                    <span class="cred-value">${password}</span>
                </div>
            `;
            logDiv.appendChild(credDiv);
        }

        window.findSuperAdmin = async function() {
            document.getElementById('log').innerHTML = '';
            log('🔍 Super adminlarni qidiryapman...', 'info');

            try {
                const q = query(collection(db, 'profiles'), where('role', '==', 'super_admin'));
                const snapshot = await getDocs(q);
                
                if (snapshot.empty) {
                    log('❌ Super admin topilmadi!', 'error');
                    log('💡 "Yangi Super Admin yaratish" tugmasini bosing', 'warning');
                } else {
                    log(`✅ ${snapshot.size} ta super admin topildi:`, 'success');
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        log(`📧 Email: ${data.email}`, 'info');
                        log(`👤 Ism: ${data.fullName}`, 'info');
                        log(`🆔 UID: ${data.uid}`, 'info');
                        log('---', 'info');
                    });
                    log('⚠️ Parolni bilmasangiz, yangi super admin yarating', 'warning');
                }
            } catch (error) {
                log(`❌ Xatolik: ${error.message}`, 'error');
            }
        };

        window.createSuperAdmin = async function() {
            document.getElementById('log').innerHTML = '';
            log('🚀 Yangi super admin yaratyapman...', 'info');

            const email = 'superadmin@qulayish.uz';
            const password = 'SuperAdmin2024!';
            const fullName = 'Super Administrator';

            try {
                // Step 1: Create Firebase Auth user
                log('1️⃣ Firebase Auth hisobi yaratyapman...', 'info');
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const uid = userCredential.user.uid;
                log(`✅ Auth hisob yaratildi: ${uid}`, 'success');

                // Step 2: Create Firestore profile
                log('2️⃣ Firestore profilini yaratyapman...', 'info');
                const profile = {
                    uid,
                    fullName,
                    email,
                    role: 'super_admin',
                    region: 'Samarqand viloyati',
                    district: 'Samarqand',
                    phoneNumber: '+998 90 000 00 00',
                    photoUrl: `https://ui-avatars.com/api/?name=${encodeURIComponent(fullName)}&background=dc2626&color=fff&size=200`,
                    isVerified: true,
                    verificationStatus: 'verified',
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString(),
                    lastActive: new Date().toISOString()
                };

                await setDoc(doc(db, 'profiles', uid), profile);
                log('✅ Firestore profili yaratildi', 'success');

                log('', 'info');
                log('🎉 Super admin muvaffaqiyatli yaratildi!', 'success');
                log('', 'info');
                
                showCredentials(email, password);

                log('', 'info');
                log('📝 Bu ma\'lumotlarni xavfsiz joyda saqlang!', 'warning');
                log('🔗 Login sahifasi: /super-admin-login', 'info');

            } catch (error) {
                if (error.code === 'auth/email-already-in-use') {
                    log('⚠️ Bu email allaqachon ishlatilmoqda', 'warning');
                    log('💡 "Super Adminni topish" tugmasini bosing', 'info');
                } else {
                    log(`❌ Xatolik: ${error.message}`, 'error');
                }
            }
        };
    </script>
</body>
</html>
