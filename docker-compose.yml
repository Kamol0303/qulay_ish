services:
  postgres:
    image: postgres:16-alpine
    container_name: qulay_ish_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: qulay_ish
      POSTGRES_PASSWORD: qulay_ish_dev
      POSTGRES_DB: qulay_ish
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qulay_ish -d qulay_ish"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
